<!-- data-sources.html -->
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OS-PBCR | Data Sources</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/data-sources.css">
    <link rel="stylesheet" href="assets/css/design-system.css">

</head>

<body>

    <div id="navbar-container"></div>

    <main>

        <!-- HERO -->

        <section class="sources-hero">

            <div class="container-custom">

                <div class="hero-content fade-up">

                    <span class="hero-tag">
                        HEALTHCARE FACILITY DIRECTORY
                    </span>

                    <h1>
                        Data Sources
                    </h1>

                    <p>
                        Registry data is compiled from participating government
                        and private healthcare institutions across Odisha.
                    </p>

                </div>

            </div>

        </section>

        <!-- CONTROLS -->

        <section class="section pb-0">

            <div class="container-custom">

                <div class="source-controls fade-up">

                    <input
                        type="text"
                        id="facilitySearch"
                        placeholder="Search hospital or district..."
                    >

                    <select id="facilityType">

                        <option value="">
                            All Facilities
                        </option>

                        <option value="Government">
                            Government
                        </option>

                        <option value="Private">
                            Private
                        </option>

                    </select>

                    <button id="exportCSV">
                        Export CSV
                    </button>

                </div>

            </div>

        </section>

        <!-- TABLE -->

        <section class="section">

            <div class="container-custom">

                <div class="table-wrapper fade-up">

                    <table class="sources-table">

                        <thead>

                            <tr>

                                <th>District</th>

                                <th>Hospital / Registry Name</th>

                                <th>Facility Type</th>

                                <th>Total Reported Cancer Cases</th>

                            </tr>

                        </thead>

                        <tbody id="facilityTableBody">

                        </tbody>

                    </table>

                </div>

                <div class="pagination-container">

                    <button id="prevFacility">
                        Previous
                    </button>

                    <span id="facilityPageInfo">
                        Page 1
                    </span>

                    <button id="nextFacility">
                        Next
                    </button>

                </div>

            </div>

        </section>

    </main>

    <div id="footer-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/core/loader.js"></script>
    <script src="assets/js/core/animations.js"></script>

    <script src="assets/js/pages/data-sources.js"></script>

</body>

</html>
