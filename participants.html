<!-- participants.html -->
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OS-PBCR | Participants</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/participants.css">
    <link rel="stylesheet" href="assets/css/design-system.css">

</head>

<body>

    <div id="navbar-container"></div>

    <main>

        <!-- HERO -->

        <section class="participants-hero">

            <div class="container-custom">

                <div class="hero-content fade-up">

                    <span class="hero-tag">
                        TRAINING PARTICIPANTS DIRECTORY
                    </span>

                    <h1>
                        Participants
                    </h1>

                    <p>
                        Directory of public health officials, oncologists,
                        registry officers, epidemiologists, and healthcare
                        professionals trained under the OS-PBCR initiative.
                    </p>

                </div>

            </div>

        </section>

        <!-- FILTERS -->

        <section class="section">

            <div class="container-custom">

                <div class="filters-container fade-up">

                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search participant..."
                    >

                    <select id="districtFilter">

                        <option value="">All Districts</option>

                        <option>Khordha</option>
                        <option>Cuttack</option>
                        <option>Puri</option>
                        <option>Angul</option>

                    </select>

                    <select id="designationFilter">

                        <option value="">All Designations</option>

                        <option>Data Officer</option>
                        <option>Oncologist</option>
                        <option>Medical Officer</option>
                        <option>Public Health Specialist</option>

                    </select>

                    <select id="sortBy">

                        <option value="name">
                            Sort By Name
                        </option>

                        <option value="district">
                            Sort By District
                        </option>

                        <option value="designation">
                            Sort By Designation
                        </option>

                    </select>

                </div>

            </div>

        </section>

        <!-- PARTICIPANTS GRID -->

        <section class="section pt-0">

            <div class="container-custom">

                <div
                    class="participants-grid"
                    id="participantsGrid"
                >

                </div>

            </div>

        </section>

    </main>

    <div id="footer-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/core/loader.js"></script>
    <script src="assets/js/core/animations.js"></script>

    <script src="assets/js/pages/participants.js"></script>

</body>

</html>
