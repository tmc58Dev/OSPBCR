<!-- data-entry-status.html -->
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OS-PBCR | Data Entry Status</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/data-entry-status.css">

</head>

<body>

    <div id="navbar-container"></div>

    <main>

        <!-- HERO -->

        <section class="status-hero">

            <div class="container-custom">

                <div class="hero-content fade-up">

                    <span class="hero-tag">
                        DISTRICT MONITORING DASHBOARD
                    </span>

                    <h1>
                        Data Entry Status by District
                    </h1>

                    <p>
                        Monitor district-wise progress of data collection,
                        validation, and reporting activities across Odisha.
                    </p>

                </div>

            </div>

        </section>

        <!-- CONTROLS -->

        <section class="section pb-0">

            <div class="container-custom">

                <div class="dashboard-controls fade-up">

                    <input
                        type="text"
                        id="searchDistrict"
                        placeholder="Search district..."
                    >

                    <select id="sortStatus">

                        <option value="district">
                            Sort By District
                        </option>

                        <option value="completion">
                            Sort By Completion %
                        </option>

                    </select>

                </div>

            </div>

        </section>

        <!-- TABLE -->

        <section class="section">

            <div class="container-custom">

                <div class="table-wrapper fade-up">

                    <table class="status-table">

                        <thead>

                            <tr>

                                <th>District Name</th>

                                <th>Target Population</th>

                                <th>Forms Submitted</th>

                                <th>Pending Reviews</th>

                                <th>Completion Status</th>

                            </tr>

                        </thead>

                        <tbody id="statusTableBody">

                        </tbody>

                    </table>

                </div>

                <div class="pagination-container">

                    <button id="prevBtn">
                        Previous
                    </button>

                    <span id="pageInfo">
                        Page 1
                    </span>

                    <button id="nextBtn">
                        Next
                    </button>

                </div>

            </div>

        </section>

    </main>

    <div id="footer-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="assets/js/core/loader.js"></script>
    <script src="assets/js/core/animations.js"></script>

    <script src="assets/js/pages/data-entry-status.js"></script>

</body>

</html>
