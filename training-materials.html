<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OS-PBCR | Training Materials</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/pages/training-materials.css">
    <link rel="stylesheet" href="assets/css/design-system.css">

</head>

<body>

    <div id="navbar-container"></div>

    <main>

        <!-- HERO -->

        <section class="training-hero">

            <div class="container-custom">

                <div class="hero-content fade-up">

                    <span class="hero-tag">
                        TRAINING RESOURCE REPOSITORY
                    </span>

                    <h1>
                        Training Materials
                    </h1>

                    <p>
                        District-wise access to training manuals,
                        registry protocols, standard operating
                        procedures, and supporting documentation
                        used under the OS-PBCR initiative.
                    </p>

                </div>

            </div>

        </section>

        <!-- SEARCH -->

        <section class="section pb-0">

            <div class="container-custom">

                <div class="search-wrapper fade-up">

                    <input
                        type="text"
                        id="districtSearch"
                        placeholder="Search district..."
                    >

                </div>

            </div>

        </section>

        <!-- DISTRICT CARDS -->

        <section class="section">

            <div class="container-custom">

                <div
                    class="district-grid"
                    id="districtGrid"
                >

                </div>

            </div>

        </section>

    </main>

    <div id="footer-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="assets/js/core/i18n.js"></script>
    <script src="assets/js/core/loader.js"></script>
    <script src="assets/js/core/animations.js"></script>

    <script src="assets/js/pages/training-materials.js"></script>

</body>

</html>
